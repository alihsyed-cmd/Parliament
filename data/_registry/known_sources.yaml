- slug: ca_on_barrie
  source_type: boundaries
  url: https://opendata.barrie.ca/datasets/wards/
  authority: City of Barrie Open Data Portal
  format: geojson
  notes: >
    Official City of Barrie open data portal (opendata.barrie.ca), ward boundaries dataset. ArcGIS Hub portal referenced from barrie.ca/services-payments/maps-gis. Also mirrored at public-barrie.opendata.arcgis.com/datasets/wards. Note that ward boundary changes were implemented in 2025 for the 2026–2030 term; confirm which boundary version is published at acquisition time.
  last_confirmed: '2026-05-26'
- slug: ca_on_barrie
  source_type: representatives
  url: https://www.barrie.ca/government-news/mayor-council-committees/city-council
  authority: City of Barrie
  format: html
  notes: >
    Official city council listing page. Confirmed to show Mayor Alex Nuttall and all 10 ward councillors (Wards 1–10) with names, emails, and phone numbers. Council is Mayor + 10 councillors elected for 4-year terms.
  last_confirmed: '2026-05-26'
- slug: ca_on_barrie
  source_type: executive
  url: https://www.barrie.ca/government-news/mayor-council-committees/office-mayor
  authority: City of Barrie
  format: html
  notes: >
    Official Office of the Mayor page. Confirmed to show Mayor Alex Nuttall with photo and contact information (705-792-7900, officeofthemayor@barrie.ca).
  last_confirmed: '2026-05-26'
- slug: ca_on_barrie
  source_type: metadata
  url: https://www.barrie.ca/government-news/2026-municipal-election
  authority: City of Barrie
  format: html
  notes: >
    Official 2026 Municipal Election page. Confirmed election date of Monday October 26, 2026; 2026–2030 council term starting November 15, 2026; references 2025 ward boundary review affecting ward count. Current term is 2022–2026. 10-ward structure with mayor and 10 councillors each serving 4-year terms.
  last_confirmed: '2026-05-26'
- slug: ca_on_brantford
